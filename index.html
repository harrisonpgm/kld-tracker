<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF7F5;font-family:'Quicksand',sans-serif;color:#3D2C35;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:'Quicksand',sans-serif}
#error-display{display:none;padding:20px;margin:20px;background:#FCE4E4;border:1px solid #E06B6B;border-radius:12px;color:#3D2C35;font-size:13px;white-space:pre-wrap;word-break:break-all}
.kf{animation:kf .3s ease}
@keyframes kf{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.kc{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:9999;animation:kcf 1.8s ease-out forwards}
@keyframes kcf{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(120vh) rotate(720deg) scale(.3)}}
.kfill{transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.kring{transition:stroke-dashoffset .8s cubic-bezier(.34,1.2,.64,1)}
.kp{transition:all .2s ease;cursor:pointer;user-select:none}
.kp:active{transform:scale(.95)}
.kov{position:fixed;inset:0;background:rgba(61,44,53,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:kf .2s ease}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#F0E4E8;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#E8A0BF;cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.15)}

</script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef,Fragment} = React;

];

const fmt=function(d){return d.toISOString().split("T")[0];};
const today=function(){return fmt(new Date());};
const parseDate=function(s){var p=s.split("-");return new Date(p[0],p[1]-1,p[2]);};
const shortDay=function(s){return parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});};
const shortDate=function(s){return parseDate(s).getDate();};
 
var emptyEntry=function(){return{feeling:null,pain:null,bristol:null,symptoms:[],flags:[],meals:DEFAULT_MEALS.map(function(m){return{id:m.id,label:m.label,colofac:null,newFoods:[]};}),extraMeals:[],fodmap:null,teaCount:0,waterCount:0,sleep:null,stress:null,period:null,notes:""};};
 
var completionFields=function(e){
  var total=8,done=0;
  if(e.feeling!==null)done++;if(e.pain!==null)done++;if(e.bristol!==null)done++;if(e.fodmap!==null)done++;
  if(e.meals.some(function(m){return m.colofac!==null;}))done++;if(e.teaCount>0||e.waterCount>0)done++;
  if(e.sleep!==null)done++;if(e.stress!==null)done++;
  return{total:total,done:done,pct:Math.round((done/total)*100)};
};
 
var storageGet=function(key){try{var v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}};
var storageSet=function(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){console.error(e);}};
var storageList=function(prefix){var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(prefix)===0)keys.push(k);}return keys;};
 
function Card(props){return <div onClick={props.onClick} style={Object.assign({},{background:C.card,borderRadius:16,padding:"18px 20px",boxShadow:C.shadow,border:"1px solid "+C.border,marginBottom:14},props.style||{})}>{props.children}</div>;}

  </svg>;
}

    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#89CFF0" stopOpacity=".8"/><stop offset="100%" stopColor="#5BA3D9" stopOpacity=".95"/></linearGradient><clipPath id="jc"><path d="M12,18 Q10,18 10,22 L10,105 Q10,112 17,112 L43,112 Q50,112 50,105 L50,22 Q50,18 48,18 Z"/></clipPath></defs>
    <path d="M12,18 Q10,18 10,22 L10,105 Q10,112 17,112 L43,112 Q50,112 50,105 L50,22 Q50,18 48,18 Z" fill="none" stroke={C.rose} strokeWidth="2.5" strokeLinejoin="round"/>
    <path d="M18,18 L18,10 Q18,6 22,6 L38,6 Q42,6 42,10 L42,18" fill="none" stroke={C.rose} strokeWidth="2.5"/>
    <g clipPath="url(#jc)"><rect className="kfill" x="10" y={112-fH} width="40" height={fH} fill="url(#wg)"/>{props.pct>5&&<ellipse cx="30" cy={112-fH} rx="20" ry="3" fill="#89CFF0" opacity=".5"/>}</g>

}
 
function CounterComp(props){
  return <div style={{display:"flex",alignItems:"center",gap:10}}>
    <span style={{fontSize:22}}>{props.emoji}</span>

      <div className="kp" onClick={function(){props.onChange(Math.max(0,props.value-1));}} style={{width:32,height:32,borderRadius:"50%",background:C.roseSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:C.rose,border:"1.5px solid "+C.rose+"33"}}>−</div>

    </div>
  </div>;
}
 
function BristolModal(props){

    <div onClick={function(e){e.stopPropagation();}} style={{background:C.card,borderRadius:20,padding:"24px 20px",maxWidth:340,width:"100%",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(61,44,53,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:16,fontWeight:700}}>Bristol Stool Chart</span>
        <div className="kp" onClick={props.onClose} style={{width:28,height:28,borderRadius:"50%",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:C.textMuted,border:"1px solid "+C.border}}>✕</div>
      </div>
      {BRISTOL.map(function(b){return <div key={b.type} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}}>
        <div style={{width:36,height:36,borderRadius:10,background:C.lavSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.lavender,flexShrink:0}}>{b.type}</div>
        <div><div style={{fontSize:13,fontWeight:700}}>{b.label}</div><div style={{fontSize:11,color:C.textMid,marginTop:2}}>{b.desc}</div></div>
      </div>;})}
      <div style={{fontSize:11,color:C.textMuted,marginTop:12,lineHeight:1.5,fontStyle:"italic"}}>Types 3–4 are generally considered ideal. Types 1–2 suggest constipation, types 5–7 suggest loose stools.</div>
    </div>
  </div>;

function LogoComp(){
  return <div style={{textAlign:"center",padding:"20px 20px 12px"}}>
    <svg viewBox="0 0 200 70" width="160" height="56" style={{display:"block",margin:"0 auto"}}>

        <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#C9B1FF"/><stop offset="100%" stopColor="#B89EF0"/></linearGradient>
        <linearGradient id="lgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#B5D8A8"/><stop offset="100%" stopColor="#8FBF82"/></linearGradient>
      </defs>
      <g transform="translate(30, 32)">
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg)" opacity="0.85" transform="rotate(0)"/>
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg2)" opacity="0.85" transform="rotate(60)"/>
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg)" opacity="0.85" transform="rotate(120)"/>
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg2)" opacity="0.85" transform="rotate(180)"/>
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg)" opacity="0.85" transform="rotate(240)"/>
        <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#pg2)" opacity="0.85" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="5" fill="#FFD9E8"/><circle cx="0" cy="0" r="3" fill="#F0C674"/>

      <text x="68" y="42" fontFamily="Pacifico, cursive" fontSize="34" fill="#E8A0BF" letterSpacing="2">KLD</text>
      <text x="68" y="58" fontFamily="Quicksand, sans-serif" fontSize="10" fill="#B09DA8" fontWeight="600" letterSpacing="3">TRACKER</text>
    </svg>
  </div>;
}
 
function KLDTracker(){
  var _s1=useState("log"),tab=_s1[0],setTab=_s1[1];
  var _s2=useState(today()),selDate=_s2[0],setSelDate=_s2[1];
  var _s3=useState({}),entries=_s3[0],setEntries=_s3[1];
  var _s4=useState(false),loaded=_s4[0],setLoaded=_s4[1];
  var _s5=useState(false),confetti=_s5[0],setConfetti=_s5[1];
  var _s6=useState(""),addMealInput=_s6[0],setAddMealInput=_s6[1];
  var _s7=useState(false),showAddMeal=_s7[0],setShowAddMeal=_s7[1];
  var _s8=useState({}),nfi=_s8[0],setNfi=_s8[1];
  var _s9=useState({}),snf=_s9[0],setSnf=_s9[1];
  var _s10=useState(false),showBI=_s10[0],setShowBI=_s10[1];
  var prevPct=useRef(0);
 
  useEffect(function(){
    var keys=storageList("kld:");
    var all={};
    keys.forEach(function(k){var v=storageGet(k);if(v)all[k.replace("kld:","")]=v;});
    setEntries(all);setLoaded(true);
  },[]);
 
  var entry=entries[selDate]||emptyEntry();
 
  var setEntry=useCallback(function(updater){
    setEntries(function(prev){
      var cur=prev[selDate]||emptyEntry();
      var upd=typeof updater==="function"?updater(cur):updater;
      var next=Object.assign({},prev);next[selDate]=upd;
      storageSet("kld:"+selDate,upd);
      return next;
    });
  },[selDate]);
 
  var uf=useCallback(function(f,v){setEntry(function(p){var n=Object.assign({},p);n[f]=v;return n;});},[setEntry]);
 
  var comp=completionFields(entry);
  useEffect(function(){
    if(comp.pct>=100&&prevPct.current<100){setConfetti(true);setTimeout(function(){setConfetti(false);},2200);}
    prevPct.current=comp.pct;
  },[comp.pct]);
 
  var calcStreak=function(){
    var s=0,d=new Date();
    var tk=fmt(d);
    if(!(entries[tk]&&completionFields(entries[tk]).pct>=50))d.setDate(d.getDate()-1);
    while(true){var k=fmt(d);var e=entries[k];if(e&&completionFields(e).pct>=50){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  };
  var streak=loaded?calcStreak():0;
 
  var dateRange=[];
  for(var di=-14;di<=7;di++){var dd=new Date();dd.setDate(dd.getDate()+di);dateRange.push(fmt(dd));}
 
  var TEA_ML=350,WATER_ML=550;
  var totalMl=entry.teaCount*TEA_ML+entry.waterCount*WATER_ML;
  var hydPct=Math.min((totalMl/2000)*100,120);
  var allMeals=[].concat(entry.meals,entry.extraMeals||[]);
 
  var toggleCol=function(id){setEntry(function(p){
    var inD=p.meals.find(function(m){return m.id===id;});
    if(inD)return Object.assign({},p,{meals:p.meals.map(function(m){return m.id===id?Object.assign({},m,{colofac:m.colofac===true?false:true}):m;})});
    return Object.assign({},p,{extraMeals:(p.extraMeals||[]).map(function(m){return m.id===id?Object.assign({},m,{colofac:m.colofac===true?false:true}):m;})});
  });};
 
  var addNF=function(id,food){
    if(!food.trim())return;
    setEntry(function(p){
      var inD=p.meals.find(function(m){return m.id===id;});
      if(inD)return Object.assign({},p,{meals:p.meals.map(function(m){return m.id===id?Object.assign({},m,{newFoods:m.newFoods.concat([food.trim()])}):m;})});
      return Object.assign({},p,{extraMeals:(p.extraMeals||[]).map(function(m){return m.id===id?Object.assign({},m,{newFoods:(m.newFoods||[]).concat([food.trim()])}):m;})});
    });
    setNfi(function(p){var n=Object.assign({},p);n[id]="";return n;});
    setSnf(function(p){var n=Object.assign({},p);n[id]=false;return n;});
  };
 
  var rmNF=function(id,idx){setEntry(function(p){
    var inD=p.meals.find(function(m){return m.id===id;});
    if(inD)return Object.assign({},p,{meals:p.meals.map(function(m){return m.id===id?Object.assign({},m,{newFoods:m.newFoods.filter(function(_,i){return i!==idx;})}):m;})});
    return Object.assign({},p,{extraMeals:(p.extraMeals||[]).map(function(m){return m.id===id?Object.assign({},m,{newFoods:(m.newFoods||[]).filter(function(_,i){return i!==idx;})}):m;})});
  });};
 
  var addEM=function(){
    if(!addMealInput.trim())return;
    setEntry(function(p){return Object.assign({},p,{extraMeals:(p.extraMeals||[]).concat([{id:"x-"+Date.now(),label:addMealInput.trim(),colofac:null,newFoods:[]}])});});
    setAddMealInput("");setShowAddMeal(false);
  };
  var rmEM=function(id){setEntry(function(p){return Object.assign({},p,{extraMeals:(p.extraMeals||[]).filter(function(m){return m.id!==id;})});});};
  var tSym=function(s){uf("symptoms",entry.symptoms.indexOf(s)>=0?entry.symptoms.filter(function(x){return x!==s;}):entry.symptoms.concat([s]));};
  var tFlg=function(f){uf("flags",entry.flags.indexOf(f)>=0?entry.flags.filter(function(x){return x!==f;}):entry.flags.concat([f]));};
 
  var getIData=function(){
    return Object.keys(entries).sort().map(function(d){
      var e=entries[d];var aM=[].concat(e.meals,e.extraMeals||[]);
      var cT=aM.filter(function(m){return m.colofac!==null;}).length;
      var cY=aM.filter(function(m){return m.colofac===true;}).length;
      return{date:parseDate(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"}),rawDate:d,feeling:e.feeling,pain:e.pain,sleep:e.sleep,stress:e.stress,hydration:(e.teaCount||0)+(e.waterCount||0),fodmap:e.fodmap,symptoms:e.symptoms?e.symptoms.length:0,colofacPct:cT>0?Math.round((cY/cT)*100):null,period:e.period,bristol:e.bristol,newFoods:aM.reduce(function(acc,m){return acc.concat(m.newFoods||[]);},[])};
    }).filter(function(d){return d.feeling!==null;});
  };
 
  var exportData=function(){
    var d=JSON.stringify(entries,null,2);var b=new Blob([d],{type:"application/json"});
    var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="kld-backup-"+today()+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  };
 
  var importData=function(evt){
    var file=evt.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=JSON.parse(e.target.result);
        Object.keys(data).forEach(function(k){storageSet("kld:"+k,data[k]);});
        setEntries(function(prev){return Object.assign({},prev,data);});

      }catch(err){alert("Error reading backup");}
    };
    reader.readAsText(file);
  };
 
  if(!loaded)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg}}><div style={{textAlign:"center"}}><div style={{fontFamily:"Pacifico,cursive",fontSize:36,color:C.rose}}>KLD</div><div style={{fontSize:13,color:C.textMuted}}>Loading...</div></div></div>;

            <div style={{fontSize:22}}>{STRESS_EMOJI[i]}</div>
            <div style={{fontSize:9,fontWeight:600,color:entry.stress===i+1?C.text:C.textMuted,marginTop:3}}>{l}</div>

    {/* TIMELINE TAB */}

        </CC>
 
        <CC title="Feeling vs Stress" subtitle="High stress → worse gut?">
          <ResponsiveContainer width="100%" height={200}><ComposedChart data={data.filter(function(d){return d.stress!==null;})}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="date" tick={ax} interval={iv}/><YAxis tick={ax} domain={[0,5]}/><Tooltip contentStyle={ts}/><Area type="monotone" dataKey="stress" stroke={C.coral} fill={C.coralSoft} strokeWidth={2} name="Stress (1-5)" dot={{r:3,fill:C.coral}}/><Line type="monotone" dataKey="feeling" stroke={C.sage} strokeWidth={2} name="Feeling" dot={{r:3,fill:C.sage}}/></ComposedChart></ResponsiveContainer>
        </CC>
 
        <CC title="Feeling vs Hydration" subtitle="Drinks per day vs feeling">
          <ResponsiveContainer width="100%" height={200}><ComposedChart data={data}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="date" tick={ax} interval={iv}/><YAxis tick={ax}/><Tooltip contentStyle={ts}/><Bar dataKey="hydration" fill={C.lavSoft} stroke={C.lavender} name="Drinks" radius={[4,4,0,0]}/><Line type="monotone" dataKey="feeling" stroke={C.sage} strokeWidth={2} name="Feeling" dot={{r:3,fill:C.sage}}/></ComposedChart></ResponsiveContainer>
        </CC>
 
        <CC title="Colofac Adherence vs Feeling" subtitle="% of meals with Colofac taken">
          <ResponsiveContainer width="100%" height={200}><ComposedChart data={data.filter(function(d){return d.colofacPct!==null;})}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="date" tick={ax} interval={iv}/><YAxis tick={ax} domain={[0,100]} yAxisId="left"/><YAxis tick={ax} domain={[0,5]} yAxisId="right" orientation="right"/><Tooltip contentStyle={ts}/><Bar dataKey="colofacPct" fill={C.sageSoft} stroke={C.sage} name="Colofac %" yAxisId="left" radius={[4,4,0,0]}/><Line type="monotone" dataKey="feeling" stroke={C.rose} strokeWidth={2} name="Feeling" yAxisId="right" dot={{r:3,fill:C.rose}}/></ComposedChart></ResponsiveContainer>
        </CC>
 
        <CC title="Symptom Frequency" subtitle="Which symptoms appear most?">{(function(){
          var counts={};data.forEach(function(d){if(d.rawDate&&entries[d.rawDate])(entries[d.rawDate].symptoms||[]).forEach(function(s){counts[s]=(counts[s]||0)+1;});});
          var items=Object.keys(counts).map(function(k){return[k,counts[k]];}).sort(function(a,b){return b[1]-a[1];});
          if(!items.length)return <div style={{fontSize:12,color:C.textMuted,padding:12}}>No symptoms logged yet</div>;
          var max=items[0][1];
          return items.map(function(item){return <div key={item[0]} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,color:C.textMid,marginBottom:3}}><span>{item[0]}</span><span>{item[1]+"x"}</span></div><div style={{height:8,borderRadius:4,background:C.bg}}><div style={{height:8,borderRadius:4,background:C.coral,width:(item[1]/max*100)+"%",transition:"width .5s"}}/></div></div>;});
        })()}</CC>
 
        {foodEvents.length>0&&<CC title="🆕 New Food Introductions" subtitle="What was introduced and how you felt">{foodEvents.map(function(d){return <div key={d.rawDate} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.border}}>
          <div><div style={{fontSize:12,fontWeight:600}}>{d.date}</div><div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{d.newFoods.map(function(f,i){return <span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:C.lavSoft,color:C.lavender,fontWeight:600}}>{"🆕 "+f}</span>;})}</div></div>
          <div style={{textAlign:"right"}}><span style={{fontSize:20}}>{d.feeling?FEELINGS[d.feeling-1]:"—"}</span>{d.pain!==null&&<div style={{fontSize:11,color:d.pain<=3?C.sage:d.pain<=6?C.amber:C.red,fontWeight:600}}>{"Pain: "+d.pain}</div>}</div>
        </div>;})}</CC>}
 
        <div style={{textAlign:"center",padding:"8px 0 20px"}}><div className="kp" onClick={exportData} style={{padding:"10px 20px",borderRadius:14,fontSize:12,color:C.textMuted,border:"1px solid "+C.border,background:C.card}}>💾 Download backup</div></div>
      </div>;
    })()}
 
    </div>
  </div>;
}
 
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KLDTracker));
</script>
</body>
</html>
