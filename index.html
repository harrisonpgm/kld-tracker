<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KLD Tracker">
<meta name="theme-color" content="#FFF7F5">
<title>KLD Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FFF7F5' width='100' height='100' rx='20'/><text x='50' y='62' text-anchor='middle' font-size='50'>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF7F5;font-family:'Quicksand',sans-serif;color:#3D2C35;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:'Quicksand',sans-serif}
.kf{animation:kf .3s ease}
@keyframes kf{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.kc{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:9999;animation:kcf 1.8s ease-out forwards}
@keyframes kcf{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(120vh) rotate(720deg) scale(.3)}}
.kfill{transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.kring{transition:stroke-dashoffset .8s cubic-bezier(.34,1.2,.64,1)}
.kp{transition:all .2s ease;cursor:pointer;user-select:none}
.kp:active{transform:scale(.95)}
.kov{position:fixed;inset:0;background:rgba(61,44,53,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:kf .2s ease}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#F0E4E8;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#E8A0BF;cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef} = React;
const {ComposedChart,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,BarChart,Bar,Area,AreaChart} = Recharts;

const C={bg:"#FFF7F5",card:"#FFFFFF",rose:"#E8A0BF",roseSoft:"#F9E4EF",coral:"#FF8FA3",coralSoft:"#FFE0E6",lavender:"#C9B1FF",lavSoft:"#EDE4FF",sage:"#A7C4A0",sageSoft:"#E3F0E1",amber:"#F0C674",amberSoft:"#FFF4DC",red:"#E06B6B",redSoft:"#FCE4E4",text:"#3D2C35",textMid:"#7A6370",textMuted:"#B09DA8",border:"#F0E4E8",shadow:"0 2px 12px rgba(61,44,53,0.06)"};
const FONT="'Quicksand',sans-serif";
const FEELINGS=["😫","😕","😐","🙂","😊"];
const FEELING_LABELS=["Awful","Not great","Okay","Good","Great"];
const STRESS_LABELS=["Very low","Low","Moderate","High","Very high"];
const STRESS_EMOJI=["😌","🙂","😐","😰","🤯"];
const SYMPTOMS=["Bloating","Cramping","Nausea","Gas","Reflux","Constipation","Diarrhoea"];
const FLAGS=["Blood","Mucus","Urgency"];
const BRISTOL=[
  {type:1,label:"Separate hard lumps",desc:"Hard to pass, like nuts or pebbles",icon:"●●●"},
  {type:2,label:"Lumpy sausage",desc:"Sausage-shaped but lumpy",icon:"▓▓"},
  {type:3,label:"Cracked sausage",desc:"Sausage with cracks on surface",icon:"█▓"},
  {type:4,label:"Smooth & soft",desc:"Like a smooth snake — ideal",icon:"██"},
  {type:5,label:"Soft blobs",desc:"Soft pieces with clear edges",icon:"◕◕"},
  {type:6,label:"Mushy",desc:"Fluffy, mushy with ragged edges",icon:"░░"},
  {type:7,label:"Liquid",desc:"Entirely watery, no solid pieces",icon:"≋≋"}
];
const PERIOD_OPTIONS=["None","Spotting","Period"];
const FODMAP_LABELS=["High risk","Risky","Mixed","Mostly safe","Very safe"];
const FODMAP_COLORS=["#E06B6B","#FF8FA3","#F0C674","#A7C4A0","#7BAF73"];
const DEFAULT_MEALS=[{id:"breakfast",label:"Breakfast"},{id:"lunch",label:"Lunch"},{id:"dinner",label:"Dinner"}];

const fmt=(d)=>d.toISOString().split("T")[0];
const today=()=>fmt(new Date());
const parseDate=(s)=>{const[y,m,d]=s.split("-");return new Date(y,m-1,d);};
const shortDay=(s)=>parseDate(s).toLocaleDateString("en-GB",{weekday:"short"});
const shortDate=(s)=>parseDate(s).getDate();

const emptyEntry=()=>({feeling:null,pain:null,bristol:null,symptoms:[],flags:[],meals:DEFAULT_MEALS.map(m=>({...m,colofac:null,newFoods:[]})),extraMeals:[],fodmap:null,teaCount:0,waterCount:0,sleep:null,stress:null,period:null,notes:""});

const completionFields=(e)=>{
  let total=8,done=0;
  if(e.feeling!==null)done++;if(e.pain!==null)done++;if(e.bristol!==null)done++;if(e.fodmap!==null)done++;
  if(e.meals.some(m=>m.colofac!==null))done++;if(e.teaCount>0||e.waterCount>0)done++;
  if(e.sleep!==null)done++;if(e.stress!==null)done++;
  return{total,done,pct:Math.round((done/total)*100)};
};

// localStorage-based storage
const storageGet=(key)=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}};
const storageSet=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch(e){console.error(e);}};
const storageList=(prefix)=>{const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(prefix))keys.push(k);}return keys;};

const Card=({children,style,onClick})=>React.createElement('div',{onClick,style:{background:C.card,borderRadius:16,padding:"18px 20px",boxShadow:C.shadow,border:`1px solid ${C.border}`,marginBottom:14,...style}},children);

const SHeader=({icon,title,done,onInfo})=>(
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      {icon&&<span style={{fontSize:18}}>{icon}</span>}
      <span style={{fontSize:15,fontWeight:700}}>{title}</span>
      {onInfo&&<div className="kp" onClick={e=>{e.stopPropagation();onInfo();}} style={{width:22,height:22,borderRadius:"50%",background:C.lavSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.lavender,border:`1px solid ${C.lavender}44`}}>i</div>}
    </div>
    {done&&<div style={{width:22,height:22,borderRadius:"50%",background:C.sage,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span></div>}
  </div>
);

const Pill=({active,color,bg,children,onClick,style})=>(
  <div className="kp" onClick={onClick} style={{padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:600,background:active?(bg||color+"22"):C.bg,color:active?(color||C.rose):C.textMuted,border:`1.5px solid ${active?(color||C.rose):C.border}`,display:"inline-flex",alignItems:"center",gap:5,...style}}>{children}</div>
);

const PRing=({pct,size=64})=>{
  const r=(size-8)/2,ci=2*Math.PI*r;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={6}/>
    <circle className="kring" cx={size/2} cy={size/2} r={r} fill="none" stroke={pct>=100?C.sage:C.rose} strokeWidth={6} strokeLinecap="round" strokeDasharray={ci} strokeDashoffset={ci-(ci*Math.min(pct,100)/100)}/>
  </svg>;
};

const Confetti=({show})=>{
  if(!show)return null;
  const cols=[C.rose,C.coral,C.lavender,C.sage,C.amber,"#FFD700"];
  return <>{Array.from({length:24}).map((_,i)=><div key={i} className="kc" style={{left:`${10+Math.random()*80}%`,top:`${-5-Math.random()*10}%`,background:cols[i%cols.length],width:6+Math.random()*6,height:6+Math.random()*6,borderRadius:Math.random()>.5?"50%":"2px",animationDelay:`${Math.random()*.5}s`,animationDuration:`${1.2+Math.random()}s`}}/>)}</>;
};

const Jug=({pct})=>{
  const fH=Math.min(pct,100)/100*90;
  return <svg viewBox="0 0 60 120" width={52} height={100}>
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#89CFF0" stopOpacity=".8"/><stop offset="100%" stopColor="#5BA3D9" stopOpacity=".95"/></linearGradient><clipPath id="jc"><path d="M12,18 Q10,18 10,22 L10,105 Q10,112 17,112 L43,112 Q50,112 50,105 L50,22 Q50,18 48,18 Z"/></clipPath></defs>
    <path d="M12,18 Q10,18 10,22 L10,105 Q10,112 17,112 L43,112 Q50,112 50,105 L50,22 Q50,18 48,18 Z" fill="none" stroke={C.rose} strokeWidth="2.5" strokeLinejoin="round"/>
    <path d="M18,18 L18,10 Q18,6 22,6 L38,6 Q42,6 42,10 L42,18" fill="none" stroke={C.rose} strokeWidth="2.5"/>
    <g clipPath="url(#jc)"><rect className="kfill" x="10" y={112-fH} width="40" height={fH} fill="url(#wg)"/>{pct>5&&<ellipse cx="30" cy={112-fH} rx="20" ry="3" fill="#89CFF0" opacity=".5"/>}</g>
    {pct>=100&&<text x="30" y="70" textAnchor="middle" fontSize="18">✨</text>}
  </svg>;
};

const Counter=({emoji,label,value,onChange})=>(
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <span style={{fontSize:22}}>{emoji}</span>
    <span style={{fontSize:13,fontWeight:600,minWidth:50}}>{label}</span>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <div className="kp" onClick={()=>onChange(Math.max(0,value-1))} style={{width:32,height:32,borderRadius:"50%",background:C.roseSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:C.rose,border:`1.5px solid ${C.rose}33`}}>−</div>
      <span style={{fontSize:18,fontWeight:700,minWidth:24,textAlign:"center"}}>{value}</span>
      <div className="kp" onClick={()=>onChange(value+1)} style={{width:32,height:32,borderRadius:"50%",background:C.rose,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#fff",border:"none"}}>+</div>
    </div>
  </div>
);

const BristolModal=({onClose})=>(
  <div className="kov" onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:20,padding:"24px 20px",maxWidth:340,width:"100%",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(61,44,53,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:16,fontWeight:700}}>Bristol Stool Chart</span>
        <div className="kp" onClick={onClose} style={{width:28,height:28,borderRadius:"50%",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:C.textMuted,border:`1px solid ${C.border}`}}>✕</div>
      </div>
      {BRISTOL.map(b=><div key={b.type} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:36,height:36,borderRadius:10,background:C.lavSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.lavender,flexShrink:0}}>{b.type}</div>
        <div><div style={{fontSize:13,fontWeight:700}}>{b.label}</div><div style={{fontSize:11,color:C.textMid,marginTop:2}}>{b.desc}</div></div>
      </div>)}
      <div style={{fontSize:11,color:C.textMuted,marginTop:12,lineHeight:1.5,fontStyle:"italic"}}>Types 3–4 are generally considered ideal. Types 1–2 suggest constipation, types 5–7 suggest loose stools.</div>
    </div>
  </div>
);

const Logo=()=>(
  <div style={{textAlign:"center",padding:"20px 20px 12px"}}>
    <svg viewBox="0 0 200 70" width="160" height="56" style={{display:"block",margin:"0 auto"}}>
      <defs>
        <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#F2B5D4"/><stop offset="100%" stopColor="#E8A0BF"/></linearGradient>
        <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#C9B1FF"/><stop offset="100%" stopColor="#B89EF0"/></linearGradient>
        <linearGradient id="lgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#B5D8A8"/><stop offset="100%" stopColor="#8FBF82"/></linearGradient>
      </defs>
      <g transform="translate(30, 32)">
        {[0,60,120,180,240,300].map((a,i)=><ellipse key={i} cx="0" cy="-10" rx="5.5" ry="10" fill={i%2===0?"url(#pg)":"url(#pg2)"} opacity="0.85" transform={`rotate(${a})`}/>)}
        <circle cx="0" cy="0" r="5" fill="#FFD9E8"/><circle cx="0" cy="0" r="3" fill="#F0C674"/>
      </g>
      <path d="M42,40 Q48,32 56,36 Q48,38 44,44 Z" fill="url(#lgg)" opacity="0.7"/>
      <text x="68" y="42" fontFamily="Pacifico, cursive" fontSize="34" fill="#E8A0BF" letterSpacing="2">KLD</text>
      <text x="68" y="58" fontFamily="Quicksand, sans-serif" fontSize="10" fill="#B09DA8" fontWeight="600" letterSpacing="3">TRACKER</text>
    </svg>
  </div>
);

function KLDTracker(){
  const[tab,setTab]=useState("log");
  const[selDate,setSelDate]=useState(today());
  const[entries,setEntries]=useState({});
  const[loaded,setLoaded]=useState(false);
  const[confetti,setConfetti]=useState(false);
  const[addMealInput,setAddMealInput]=useState("");
  const[showAddMeal,setShowAddMeal]=useState(false);
  const[nfi,setNfi]=useState({});
  const[snf,setSnf]=useState({});
  const[showBI,setShowBI]=useState(false);
  const prevPct=useRef(0);

  useEffect(()=>{
    const keys=storageList("kld:");
    const all={};
    keys.forEach(k=>{const v=storageGet(k);if(v)all[k.replace("kld:","")]=v;});
    setEntries(all);setLoaded(true);
  },[]);

  const entry=entries[selDate]||emptyEntry();
  const setEntry=useCallback((updater)=>{
    setEntries(prev=>{
      const cur=prev[selDate]||emptyEntry();
      const upd=typeof updater==="function"?updater(cur):updater;
      const next={...prev,[selDate]:upd};
      storageSet(`kld:${selDate}`,upd);
      return next;
    });
  },[selDate]);
  const uf=useCallback((f,v)=>setEntry(p=>({...p,[f]:v})),[setEntry]);

  const comp=completionFields(entry);
  useEffect(()=>{
    if(comp.pct>=100&&prevPct.current<100){setConfetti(true);setTimeout(()=>setConfetti(false),2200);}
    prevPct.current=comp.pct;
  },[comp.pct]);

  const calcStreak=()=>{
    let s=0,d=new Date();
    if(!(entries[fmt(d)]&&completionFields(entries[fmt(d)]).pct>=50))d.setDate(d.getDate()-1);
    while(true){const k=fmt(d);const e=entries[k];if(e&&completionFields(e).pct>=50){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  };
  const streak=loaded?calcStreak():0;

  const dateRange=[];
  for(let i=-14;i<=7;i++){const d=new Date();d.setDate(d.getDate()+i);dateRange.push(fmt(d));}

  const TEA_ML=350,WATER_ML=550;
  const totalMl=entry.teaCount*TEA_ML+entry.waterCount*WATER_ML;
  const hydPct=Math.min((totalMl/2000)*100,120);
  const allMeals=[...entry.meals,...(entry.extraMeals||[])];

  const toggleCol=(id)=>{setEntry(p=>{const inD=p.meals.find(m=>m.id===id);if(inD)return{...p,meals:p.meals.map(m=>m.id===id?{...m,colofac:m.colofac===true?false:true}:m)};return{...p,extraMeals:(p.extraMeals||[]).map(m=>m.id===id?{...m,colofac:m.colofac===true?false:true}:m)};});};
  const addNF=(id,food)=>{if(!food.trim())return;setEntry(p=>{const inD=p.meals.find(m=>m.id===id);if(inD)return{...p,meals:p.meals.map(m=>m.id===id?{...m,newFoods:[...m.newFoods,food.trim()]}:m)};return{...p,extraMeals:(p.extraMeals||[]).map(m=>m.id===id?{...m,newFoods:[...(m.newFoods||[]),food.trim()]}:m)};});setNfi(p=>({...p,[id]:""}));setSnf(p=>({...p,[id]:false}));};
  const rmNF=(id,idx)=>{setEntry(p=>{const inD=p.meals.find(m=>m.id===id);if(inD)return{...p,meals:p.meals.map(m=>m.id===id?{...m,newFoods:m.newFoods.filter((_,i)=>i!==idx)}:m)};return{...p,extraMeals:(p.extraMeals||[]).map(m=>m.id===id?{...m,newFoods:(m.newFoods||[]).filter((_,i)=>i!==idx)}:m)};});};
  const addEM=()=>{if(!addMealInput.trim())return;setEntry(p=>({...p,extraMeals:[...(p.extraMeals||[]),{id:`x-${Date.now()}`,label:addMealInput.trim(),colofac:null,newFoods:[]}]}));setAddMealInput("");setShowAddMeal(false);};
  const rmEM=(id)=>setEntry(p=>({...p,extraMeals:(p.extraMeals||[]).filter(m=>m.id!==id)}));
  const tSym=(s)=>uf("symptoms",entry.symptoms.includes(s)?entry.symptoms.filter(x=>x!==s):[...entry.symptoms,s]);
  const tFlg=(f)=>uf("flags",entry.flags.includes(f)?entry.flags.filter(x=>x!==f):[...entry.flags,f]);

  const getIData=()=>{
    return Object.keys(entries).sort().map(d=>{
      const e=entries[d];const aM=[...e.meals,...(e.extraMeals||[])];
      const cT=aM.filter(m=>m.colofac!==null).length;const cY=aM.filter(m=>m.colofac===true).length;
      return{date:parseDate(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"}),rawDate:d,feeling:e.feeling,pain:e.pain,sleep:e.sleep,stress:e.stress,hydration:(e.teaCount||0)+(e.waterCount||0),fodmap:e.fodmap,symptoms:e.symptoms?.length||0,colofacPct:cT>0?Math.round((cY/cT)*100):null,period:e.period,bristol:e.bristol,newFoods:aM.flatMap(m=>m.newFoods||[])};
    }).filter(d=>d.feeling!==null);
  };

  const exportData=()=>{
    const d=JSON.stringify(entries,null,2);const b=new Blob([d],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`kld-backup-${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  };

  const importData=(evt)=>{
    const file=evt.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        Object.entries(data).forEach(([k,v])=>storageSet(`kld:${k}`,v));
        setEntries(prev=>({...prev,...data}));
        alert("Backup restored successfully!");
      }catch{alert("Error reading backup file");}
    };
    reader.readAsText(file);
  };

  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg}}><div style={{textAlign:"center"}}><div style={{fontFamily:"'Pacifico',cursive",fontSize:36,color:C.rose}}>KLD</div><div style={{fontSize:13,color:C.textMuted}}>Loading...</div></div></div>;

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80,maxWidth:480,margin:"0 auto",overflowX:"hidden"}}>
      <Confetti show={confetti}/>
      {showBI&&<BristolModal onClose={()=>setShowBI(false)}/>}
      <Logo/>

      <div style={{display:"flex",gap:6,overflowX:"auto",padding:"4px 16px 12px",scrollSnapType:"x mandatory"}}>
        {dateRange.map(d=>{
          const isT=d===today(),isS=d===selDate,hasE=entries[d]&&completionFields(entries[d]).pct>0;
          return<div key={d} onClick={()=>setSelDate(d)} style={{minWidth:46,padding:"8px 4px",borderRadius:14,textAlign:"center",cursor:"pointer",background:isS?C.rose:"transparent",scrollSnapAlign:"center",border:`1.5px solid ${isS?C.rose:isT?C.rose+"66":"transparent"}`,transition:"all 0.2s"}}>
            <div style={{fontSize:10,fontWeight:600,color:isS?"#fff":C.textMuted,textTransform:"uppercase"}}>{shortDay(d)}</div>
            <div style={{fontSize:18,fontWeight:700,color:isS?"#fff":C.text,margin:"2px 0"}}>{shortDate(d)}</div>
            {hasE&&<div style={{width:5,height:5,borderRadius:"50%",background:isS?"#fff":C.sage,margin:"0 auto"}}/>}
          </div>;
        })}
      </div>

      <div style={{display:"flex",padding:"0 20px",marginBottom:16}}>
        {[{id:"log",l:"✏️ Log"},{id:"timeline",l:"📅 Timeline"},{id:"insights",l:"📊 Insights"}].map(t=>
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,textAlign:"center",padding:"10px 0",cursor:"pointer",borderBottom:`3px solid ${tab===t.id?C.rose:"transparent"}`,transition:"all 0.2s"}}>
            <span style={{fontSize:13,fontWeight:tab===t.id?700:500,color:tab===t.id?C.rose:C.textMuted}}>{t.l}</span>
          </div>
        )}
      </div>

      <div style={{padding:"0 16px"}}>

      {tab==="log"&&(
        <div className="kf">

          <CC title="Colofac Adherence vs Feeling" subtitle="% of meals with Colofac taken"><ResponsiveContainer width="100%" height={200}><ComposedChart data={data.filter(d=>d.colofacPct!==null)}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="date" tick={ax} interval={iv}/><YAxis tick={ax} domain={[0,100]} yAxisId="left"/><YAxis tick={ax} domain={[0,5]} yAxisId="right" orientation="right"/><Tooltip contentStyle={ts}/><Bar dataKey="colofacPct" fill={C.sageSoft} stroke={C.sage} name="Colofac %" yAxisId="left" radius={[4,4,0,0]}/><Line type="monotone" dataKey="feeling" stroke={C.rose} strokeWidth={2} name="Feeling" yAxisId="right" dot={{r:3,fill:C.rose}}/></ComposedChart></ResponsiveContainer></CC>
          <CC title="Symptom Frequency" subtitle="Which symptoms appear most?">{(()=>{const counts={};data.forEach(d=>{if(d.rawDate&&entries[d.rawDate])entries[d.rawDate].symptoms?.forEach(s=>{counts[s]=(counts[s]||0)+1;});});const items=Object.entries(counts).sort((a,b)=>b[1]-a[1]);if(!items.length)return<div style={{fontSize:12,color:C.textMuted,padding:12}}>No symptoms logged yet</div>;const max=items[0][1];return items.map(([name,count])=><div key={name} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,color:C.textMid,marginBottom:3}}><span>{name}</span><span>{count}x</span></div><div style={{height:8,borderRadius:4,background:C.bg}}><div style={{height:8,borderRadius:4,background:C.coral,width:`${(count/max)*100}%`,transition:"width .5s"}}/></div></div>);})()}</CC>
          {foodEvents.length>0&&<CC title="🆕 New Food Introductions" subtitle="What was introduced and how you felt">{foodEvents.map(d=><div key={d.rawDate} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{fontSize:12,fontWeight:600}}>{d.date}</div><div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{d.newFoods.map((f,i)=><span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:C.lavSoft,color:C.lavender,fontWeight:600}}>🆕 {f}</span>)}</div></div><div style={{textAlign:"right"}}><span style={{fontSize:20}}>{d.feeling?FEELINGS[d.feeling-1]:"—"}</span>{d.pain!==null&&<div style={{fontSize:11,color:d.pain<=3?C.sage:d.pain<=6?C.amber:C.red,fontWeight:600}}>Pain: {d.pain}</div>}</div></div>)}</CC>}
          <div style={{textAlign:"center",padding:"8px 0 20px"}}><div className="kp" onClick={exportData} style={{padding:"10px 20px",borderRadius:14,fontSize:12,color:C.textMuted,border:`1px solid ${C.border}`,background:C.card}}>💾 Download backup</div></div>
        </div>;
      })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KLDTracker));
</script>
</body>
</html>
